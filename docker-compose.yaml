# docker-compose.yml

services:
  frontend:
    build: ./frontend
    depends_on:
      - backend
    networks:
      - app-network
      

  backend:
    build: ./backend
    ports:
    - "8000:8000"
    depends_on:
      - mongodb
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - JWT_SECRET=your_jwt_secret_key
    networks:
      - app-network
    container_name: charging_station-backend-1
    hostname: backend  


  mongodb:
    image: mongo
    container_name: mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

volumes:
  mongodb_data:

networks:
  app-network:
    driver: bridge
